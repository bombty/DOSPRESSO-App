name: Bundle 7 E2E — Şube Puantaj + Fazla Mesai (Task #327, manual)

# Bu workflow yalnızca manuel tetiklenir (workflow_dispatch).
# Otomatik tetik (push/pull_request) yok — çünkü:
#   1. drizzle-kit push bu DB'de timeout veriyor (replit.md note),
#      fresh CI Postgres'i şemayla doldurmak için ayrı bir migration
#      runner / pg_dump seed pipeline gerekir (henüz yok).
#   2. Test `findUsableBranch()` ile mevcut seed verisine güveniyor;
#      boş Postgres'te fail eder.
#
# Manuel kullanım: Actions → "Bundle 7 E2E ..." → Run workflow.
# Çalıştıran kişi DATABASE_URL secret'ının seed'li bir Postgres'e
# işaret ettiğinden emin olmalıdır.
#
# Otomatik gate eklemek için ayrı task: CI seed pipeline (#332+).

on:
  workflow_dispatch:

jobs:
  e2e-manual:
    name: Playwright API-level e2e (3 senaryo, manuel)
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.E2E_DATABASE_URL }}
      SESSION_SECRET: ${{ secrets.E2E_SESSION_SECRET }}
      NODE_ENV: test
      E2E_BASE_URL: http://127.0.0.1:5000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Guard required secrets
        run: |
          test -n "$DATABASE_URL" || { echo "::error::E2E_DATABASE_URL secret missing"; exit 1; }
          test -n "$SESSION_SECRET" || { echo "::error::E2E_SESSION_SECRET secret missing"; exit 1; }
      - run: npm ci
      - name: Boot dev server (background)
        run: |
          npm run dev > server.log 2>&1 &
          for i in {1..30}; do
            if curl -sf http://127.0.0.1:5000/api/health 2>/dev/null; then
              echo "Server up"; exit 0
            fi
            sleep 2
          done
          echo "::error::Server failed to start"; tail -200 server.log; exit 1
      - run: npx playwright test --config=playwright.config.ts tests/e2e/branch-attendance-settings.spec.ts
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: server-log
          path: server.log
